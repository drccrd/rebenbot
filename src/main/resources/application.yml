spring:
  application:
    name: rebenbot
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  flyway:
    enabled: true

server:
  address: 0.0.0.0
  port: 8080
  servlet:
    context-path: /api

# Meteoblue API Configuration
meteoblue:
  api:
    key: ${METEOBLUE_API_KEY:demo}

logging:
  level:
    root: INFO
    com.rebenbot: DEBUG
