spring:
  application:
    name: rebenbot
  task:
    scheduling:
      pool:
        size: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  flyway:
    enabled: true

server:
  address: 0.0.0.0
  port: 8080
  servlet:
    context-path: /api

# CORS — dev only (Vite dev server). In production the frontend is served from
# the same origin, so no CORS header is needed. Set to empty string to disable.
cors:
  allowed-origin: "http://localhost:5173"

# Meteoblue API Configuration
meteoblue:
  api:
    key: ${METEOBLUE_API_KEY:demo}

# BVL PSM-API sync configuration (https://psm-api.bvl.bund.de/)
sync:
  bvl:
    url: https://psm-api.bvl.bund.de/ords/psm/api-v1
    # Monthly sync: 04:00 on the 1st of each month (BVL publishes updates monthly)
    cron: "0 0 4 1 * *"
    enabled: true
    timeout-seconds: 60

logging:
  level:
    root: INFO
    org.flywaydb: INFO
    com.rebenbot: INFO
    # Suppress PDFBox/FontBox errors and warnings (unavoidable during PDF text extraction)
    org.apache.pdfbox: ERROR
    org.apache.fontbox: ERROR
    org.apache.fontbox.ttf.GlyphSubstitutionTable: OFF
    org.apache.fontbox.ttf.CmapSubtable: OFF
    org.apache.pdfbox.pdmodel.font: OFF
    org.apache.pdfbox.text.PDFTextStripper: ERROR
