services:
  postgres:
    image: postgres:17-alpine
    container_name: rebenbot-db
    environment:
      POSTGRES_DB: rebenbot
      POSTGRES_USER: rebenbot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-c max_connections=100"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rebenbot -d rebenbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rebenbot-network

networks:
  rebenbot-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
